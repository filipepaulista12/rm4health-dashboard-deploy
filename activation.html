<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏥 RM4Health Dashboard - Ativação GitHub Pages</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 600px;
        }
        .loading {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .redirect-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .redirect-btn:hover {
            background: white;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading">🚀</div>
        <h1>RM4Health Dashboard</h1>
        <p>Ativando GitHub Pages...</p>
        <p>Se não redirecionar automaticamente:</p>
        <a href="./index.html" class="redirect-btn">📊 Acessar Dashboard</a>
    </div>
    
    <script>
        // Redirecionar para o dashboard principal após 3 segundos
        setTimeout(() => {
            window.location.href = './index.html';
        }, 3000);
        
        // Verificar se index.html existe
        fetch('./index.html')
            .then(response => {
                if (response.ok) {
                    console.log('✅ Dashboard encontrado');
                } else {
                    console.log('⚠️ Dashboard não encontrado');
                }
            })
            .catch(err => console.log('❌ Erro:', err));
    </script>
</body>
</html>
